<!-- menu.html - Menu Page with Filtering & Search -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TastePal | Our Menu</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="shortcut icon" href="https://img.icons8.com/color/48/restaurant.png" type="image/x-icon">
</head>
<body>

<nav class="navbar">
    <div class="container nav-container">
        <a href="index.html" class="logo">
            <i class="fas fa-utensils"></i>
            <span>TastePal</span>
        </a>
        <div class="hamburger" id="hamburger">
            <i class="fas fa-bars"></i>
        </div>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="menu.html" class="active">Menu</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><button class="dark-toggle" id="darkModeBtn"><i class="fas fa-moon"></i> Dark</button></li>
        </ul>
    </div>
</nav>

<main>
    <section class="menu-section">
        <div class="container">
            <h1 class="section-title">Our Signature Menu</h1>
            <div class="filter-bar">
                <button class="filter-btn active" data-cat="all">All</button>
                <button class="filter-btn" data-cat="Fast Food">Fast Food</button>
                <button class="filter-btn" data-cat="BBQ">BBQ</button>
                <button class="filter-btn" data-cat="Pizza">Pizza</button>
                <button class="filter-btn" data-cat="Burgers">Burgers</button>
                <button class="filter-btn" data-cat="Drinks">Drinks</button>
                <button class="filter-btn" data-cat="Desserts">Desserts</button>
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchMenu" class="search-input" placeholder="Search dishes...">
                </div>
            </div>
            <div class="menu-grid" id="menuGrid"></div>
        </div>
    </section>
</main>

<footer class="footer">
    <div class="container">
        <div class="footer-content">
            <div class="footer-brand">
                <i class="fas fa-utensils"></i>
                <h3>TastePal</h3>
                <p>Savor the Moment</p>
            </div>
            <div class="footer-links">
                <h4>Quick Links</h4>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="menu.html">Menu</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </div>
            <div class="footer-contact">
                <h4>Contact</h4>
                <p><i class="fas fa-map-marker-alt"></i> 123 Flavor Avenue, NY</p>
                <p><i class="fas fa-phone"></i> +1 (555) 789-1234</p>
                <p><i class="fas fa-envelope"></i> hello@tastepal.com</p>
            </div>
            <div class="footer-social">
                <h4>Follow Us</h4>
                <div class="social-links">
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-facebook"></i></a>
                    <a href="#"><i class="fab fa-twitter"></i></a>
                    <a href="#"><i class="fab fa-youtube"></i></a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2025 TastePal. All rights reserved.</p>
        </div>
    </div>
</footer>

<div class="back-to-top" id="backToTop">
    <i class="fas fa-arrow-up"></i>
</div>

<script src="js/main.js"></script>
<script src="js/menu.js"></script>
</body>
</html>
